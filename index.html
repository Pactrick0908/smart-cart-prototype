<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Prototype đơn giản — Hành trình mua sắm xe đẩy thông minh</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B1220; --ink-2:#121C2E; --porcelain:#F7F5F0;
    --cart-green:#2FE39E; --amber:#FFB454; --slate:#8592A6; --slate-dim:#4B5568;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; font-family:'Be Vietnam Pro', sans-serif;
    background:radial-gradient(120% 140% at 50% -10%, #16223A 0%, var(--ink) 55%);
    display:flex; align-items:center; justify-content:center; min-height:640px;
    color:var(--porcelain); overflow:hidden;
  }
  .kiosk{
    width:min(460px, 95vw); height:min(800px, 94vh);
    background:linear-gradient(180deg, var(--ink-2) 0%, #0E1728 100%);
    border-radius:38px; border:1px solid rgba(255,255,255,0.06);
    box-shadow:0 40px 80px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    position:relative; display:flex; flex-direction:column; overflow:hidden;
  }
  .readout{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 24px 0 24px; font-family:'JetBrains Mono', monospace;
    font-size:10.5px; letter-spacing:0.1em; color:var(--slate); text-transform:uppercase;
  }
  .readout .dot-live{display:inline-flex; align-items:center; gap:6px;}
  .readout .dot-live::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--cart-green);box-shadow:0 0 8px var(--cart-green);}

  .progress{ display:flex; gap:6px; padding:14px 24px 0 24px; }
  .progress .seg{ flex:1; height:4px; border-radius:4px; background:rgba(255,255,255,0.08); }
  .progress .seg.done{ background:var(--cart-green); }
  .progress .seg.current{ background:linear-gradient(90deg, var(--cart-green) 50%, rgba(255,255,255,0.08) 50%); }

  .screens{ position:relative; flex:1; overflow:hidden; }
  .screen{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
    padding:20px 26px 10px 26px; opacity:0; transform:translateX(20px);
    transition:opacity .2s ease, transform .2s ease; pointer-events:none; text-align:center;
  }
  .screen.active{ opacity:1; transform:translateX(0); pointer-events:auto; }

  .step-tag{
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.1em;
    color:var(--slate-dim); text-transform:uppercase; margin-bottom:8px; align-self:flex-start;
  }
  .step-tag b{ color:var(--cart-green); }

  .illus{ width:200px; height:170px; margin:4px 0 10px 0; }

  h2.screen-title{ font-size:20px; font-weight:800; margin:0 0 8px 0; line-height:1.3; }
  p.screen-desc{ font-size:14px; line-height:1.6; color:var(--slate); margin:0; max-width:340px; }

  .bullets{ text-align:left; margin:14px 0 0 0; padding:0; list-style:none; width:100%; max-width:340px; }
  .bullets li{ font-size:13.5px; color:var(--porcelain); padding:8px 0 8px 26px; position:relative; border-bottom:1px solid rgba(255,255,255,0.06); }
  .bullets li::before{ content:"•"; position:absolute; left:6px; color:var(--cart-green); font-weight:800; }

  .br-note{
    margin-top:12px; font-size:11.5px; line-height:1.5; color:var(--amber);
    background:rgba(255,180,84,0.08); border:1px solid rgba(255,180,84,0.22);
    border-radius:12px; padding:8px 12px; max-width:340px;
  }

  .bottom-nav{ display:flex; gap:10px; padding:14px 20px 20px 20px; }
  .btn{ flex:1; border:none; border-radius:18px; padding:16px 8px; font-family:'Be Vietnam Pro',sans-serif; font-size:15px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; transition:transform .08s ease; }
  .btn:active{ transform:scale(.97); }
  .btn-primary{ background:var(--cart-green); color:#062018; }
  .btn-ghost{ background:rgba(255,255,255,0.05); color:var(--porcelain); border:1px solid rgba(255,255,255,0.1); flex:0 0 90px; }
  .btn-skip{ background:transparent; color:var(--slate); flex:0 0 auto; }
</style>
</head>
<body>
<div class="kiosk">
  <div class="readout"><span class="dot-live">XE ĐẨY #042</span><span id="clock">--:--</span></div>
  <div class="progress" id="progressBar"></div>
  <div class="screens" id="screens"></div>
  <div class="bottom-nav" id="bottomNav"></div>
</div>

<script>
/* clock */
function clock(){ const d=new Date(); document.getElementById('clock').textContent = d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
clock(); setInterval(clock,15000);

/* ---------- human illustrations (flat silhouette style) ---------- */
const P = '#2FE39E';       // person accent
const PORC = '#F7F5F0';    // soft fill
const ILLUS = {
  welcome: `
    <svg class="illus" viewBox="0 0 200 170" fill="none">
      <ellipse cx="100" cy="150" rx="60" ry="8" fill="rgba(47,227,158,0.08)"/>

      <path d="M102 90 q22 -4 28 14" stroke="${P}" stroke-width="6" stroke-linecap="round" fill="none"/>

      <rect x="128" y="96" width="34" height="26" rx="5" fill="none" stroke="${P}" stroke-width="4"/>

  loginSearch: `

      <path d="M50 96 q-6 22 2 44" stroke="${PORC}" stroke-width="6" stroke-linecap="round" fill="none"/>

      <circle cx="118" cy="138" r="5" fill="${P}"/><circle cx="146" cy="138" r="5" fill="${P}"/>
    </svg>`,
  scanCart: `
    <svg class="illus" viewBox="0 0 200 170" fill="none">
      <ellipse cx="100" cy="150" rx="60" ry="8" fill="rgba(47,227,158,0.08)"/>
      <rect x="86" y="94" width="60" height="38" rx="6" fill="none" stroke="${P}" stroke-width="4"/>
      <circle cx="96" cy="136" r="5" fill="${P}"/><circle cx="136" cy="136" r="5" fill="${P}"/>
      <rect x="100" y="70" width="20" height="20" rx="3" fill="${PORC}" opacity="0.9"/>
      <path d="M92 70 v-14 M128 70 v-14" stroke="${P}" stroke-width="3" stroke-dasharray="3 4"/>
      <circle cx="46" cy="50" r="14" fill="${PORC}"/>
      <path d="M32 150 v-42 q0 -18 14 -18 h0 q14 0 14 18 v14" fill="${PORC}"/>
      <path d="M60 92 q22 -14 40 -18" stroke="${PORC}" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M32 96 q-4 22 4 44" stroke="${PORC}" stroke-width="6" stroke-linecap="round" fill="none"/>
    </svg>`,
  reviewCart: `
    <svg class="illus" viewBox="0 0 200 170" fill="none">
      <ellipse cx="100" cy="150" rx="60" ry="8" fill="rgba(47,227,158,0.08)"/>
      <rect x="112" y="40" width="52" height="76" rx="8" fill="none" stroke="${P}" stroke-width="4"/>
      <path d="M122 56 h32 M122 68 h32 M122 80 h20" stroke="${P}" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M118 96 l6 6 l12 -12" stroke="${P}" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="66" cy="52" r="14" fill="${PORC}"/>
      <path d="M52 150 v-42 q0 -18 14 -18 h0 q14 0 14 18 v20" fill="${PORC}"/>
      <path d="M80 96 q20 -18 32 -30" stroke="${PORC}" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M52 96 q-6 22 2 44" stroke="${PORC}" stroke-width="6" stroke-linecap="round" fill="none"/>
    </svg>`,
  payment: `
    <svg class="illus" viewBox="0 0 200 170" fill="none">
      <ellipse cx="100" cy="150" rx="60" ry="8" fill="rgba(47,227,158,0.08)"/>
      <rect x="112" y="46" width="50" height="72" rx="8" fill="none" stroke="${P}" stroke-width="4"/>
      <rect x="122" y="60" width="30" height="20" rx="3" fill="${P}" opacity="0.5"/>
      <path d="M122 92 h30 M122 102 h20" stroke="${P}" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="66" cy="52" r="14" fill="${PORC}"/>
      <path d="M52 150 v-42 q0 -18 14 -18 h0 q14 0 14 18 v18" fill="${PORC}"/>
      <path d="M80 92 q20 -12 34 -28" stroke="${PORC}" stroke-width="6" stroke-linecap="round" fill="none"/>
      <rect x="106" y="58" width="16" height="10" rx="2" fill="${PORC}"/>
      <path d="M52 96 q-6 22 2 44" stroke="${PORC}" stroke-width="6" stroke-linecap="round" fill="none"/>
    </svg>`,
  qrConfirm: `
    <svg class="illus" viewBox="0 0 200 170" fill="none">
      <ellipse cx="100" cy="150" rx="60" ry="8" fill="rgba(47,227,158,0.08)"/>

      <g transform="translate(122,50)"><rect width="10" height="10" fill="${P}"/><rect x="18" width="10" height="10" fill="${P}"/><rect y="18" width="10" height="10" fill="${P}"/><rect x="9" y="9" width="10" height="10" fill="${P}"/><rect x="18" y="18" width="10" height="10" fill="${P}"/></g>
      <circle cx="60" cy="80" r="13" fill="${PORC}"/>
      <path d="M48 168 v-40 q0 -16 12 -16 h0 q12 0 12 16 v6" fill="${PORC}"/>

      <rect x="94" y="78" width="18" height="30" rx="3" fill="${PORC}"/>

    </svg>`,
  gate: `
    <svg class="illus" viewBox="0 0 200 170" fill="none">
      <ellipse cx="100" cy="150" rx="60" ry="8" fill="rgba(47,227,158,0.08)"/>
      <path d="M60 150 v-90 M140 150 v-90" stroke="${P}" stroke-width="6" stroke-linecap="round"/>
      <path d="M55 60 h90" stroke="${P}" stroke-width="6" stroke-linecap="round"/>
      <circle cx="90" cy="50" r="13" fill="${PORC}"/>
      <path d="M78 150 v-40 q0 -16 12 -16 h0 q12 0 12 16 v18" fill="${PORC}"/>
      <path d="M102 90 q16 -8 22 -2" stroke="${PORC}" stroke-width="6" stroke-linecap="round" fill="none"/>
      <rect x="106" y="102" width="40" height="30" rx="6" fill="none" stroke="${P}" stroke-width="4"/>
      <circle cx="114" cy="134" r="4" fill="${P}"/><circle cx="138" cy="134" r="4" fill="${P}"/>
      <path d="M78 96 q-8 20 0 40" stroke="${PORC}" stroke-width="6" stroke-linecap="round" fill="none"/>
    </svg>`,
  exit: `
    <svg class="illus" viewBox="0 0 200 170" fill="none">
      <ellipse cx="100" cy="150" rx="60" ry="8" fill="rgba(47,227,158,0.08)"/>
      <path d="M50 150 v-100 M150 150 v-100" stroke="${P}" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
      <circle cx="110" cy="48" r="14" fill="${PORC}"/>
      <path d="M96 150 v-42 q0 -18 14 -18 h0 q14 0 14 18 v20" fill="${PORC}"/>
      <path d="M124 92 q18 -6 26 4" stroke="${PORC}" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M96 92 q-18 -6 -26 4" stroke="${PORC}" stroke-width="6" stroke-linecap="round" fill="none"/>
      <rect x="62" y="76" width="20" height="24" rx="4" fill="none" stroke="${P}" stroke-width="4"/>
      <path d="M110 96 q-6 24 4 44" stroke="${PORC}" stroke-width="6" stroke-linecap="round" fill="none"/>
    </svg>`,
  done: `
    <svg class="illus" viewBox="0 0 200 170" fill="none">
      <ellipse cx="100" cy="150" rx="60" ry="8" fill="rgba(47,227,158,0.08)"/>
      <circle cx="100" cy="46" r="15" fill="${PORC}"/>
      <path d="M84 150 v-40 q0 -18 16 -18 h0 q16 0 16 18 v40" fill="${PORC}"/>
      <path d="M116 90 q24 -18 30 -34" stroke="${PORC}" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M84 92 q-24 -14 -30 -30" stroke="${PORC}" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M60 40 l8 8 M150 40 l-8 8 M100 20 v10" stroke="${P}" stroke-width="4" stroke-linecap="round"/>
    </svg>`
};

/* ---------- content (simplified, linear) ---------- */
const steps = [
  { id:'welcome', illus:ILLUS.welcome, tag:'Bắt đầu', title:'Chào mừng đến với siêu thị!', desc:'Cùng xem qua hành trình mua sắm với xe đẩy thông minh, từ lúc đăng nhập đến khi rời cửa hàng.' },
  { id:'login', illus:ILLUS.loginSearch, tag:'UA1 · Tìm sản phẩm', title:'Đăng nhập & tìm sản phẩm', desc:'Quét mã QR hoặc dùng tài khoản liên kết để đăng nhập, chọn chế độ Cá nhân/Gia đình, rồi tìm sản phẩm cần mua.',
    bullets:['Chọn phương thức đăng nhập','Chọn chế độ mua sắm','Nhập từ khóa hoặc chọn gợi ý AI'],
    br:'Sản phẩm hết hàng sẽ tự động không hiển thị trong kết quả tìm kiếm.' },
  { id:'navigate', illus:ILLUS.navigate, tag:'UA1 · Tìm sản phẩm', title:'Đi theo sơ đồ lộ trình', desc:'Màn hình hiển thị bản đồ và đường đi ngắn nhất đến kệ hàng. Bạn chỉ cần đẩy xe theo mũi tên chỉ dẫn.',
    bullets:['Xem vị trí hiện tại trên bản đồ','Đi theo hướng dẫn đến kệ','Nhận thông báo khi đến nơi'] },
  { id:'scan', illus:ILLUS.scanCart, tag:'UA2 · Giỏ hàng', title:'Quét sản phẩm vào xe', desc:'Quét mã vạch và bỏ sản phẩm vào xe. Cảm biến sẽ tự động cân để đối chiếu với dữ liệu hệ thống.',
    bullets:['Quét mã vạch sản phẩm','Xe tự động cân khối lượng','Tự động xác nhận thêm món vào giỏ'] },
  { id:'review', illus:ILLUS.reviewCart, tag:'UA2 · Giỏ hàng', title:'Kiểm tra giỏ hàng', desc:'Xem danh sách sản phẩm và tổng tiền tạm tính. Có thể bỏ bớt sản phẩm nếu đổi ý trước khi thanh toán.',
    bullets:['Xem danh sách & tổng tiền','Bỏ sản phẩm ra nếu không mua','Chốt giỏ hàng để thanh toán'] },
  { id:'payment', illus:ILLUS.payment, tag:'UA3 · Thanh toán', title:'Chọn phương thức thanh toán', desc:'Xem lại hóa đơn, áp dụng voucher nếu có, rồi chọn thanh toán bằng ví điện tử hoặc thẻ ngân hàng.',
    bullets:['Xem tổng kết hóa đơn','Áp dụng voucher giảm giá','Chọn phương thức thanh toán'] },
  { id:'qr', illus:ILLUS.qrConfirm, tag:'UA3 · Thanh toán', title:'Quét mã & hoàn tất', desc:'Dùng điện thoại quét mã QR trên màn hình xe đẩy để xác nhận thanh toán và nhận hóa đơn điện tử.',
    bullets:['Quét mã QR bằng điện thoại','Xác thực thanh toán','Nhận mã QR hóa đơn'],
    br:'Mã QR hóa đơn chỉ được cấp khi thanh toán đã thành công 100%.' },
  { id:'gate', illus:ILLUS.gate, tag:'UA4 · Kiểm tra', title:'Quét mã tại cổng', desc:'Đưa mã QR hóa đơn vào cổng để hệ thống đối chiếu mã hàng và cân nặng thực tế trước khi cho ra vào.',
    bullets:['Quét mã QR hóa đơn tại cổng','Đẩy xe lên bàn cân đối soát','Xem kết quả đối soát'],
    br:'Cổng chỉ tự động mở khi mã hợp lệ và cân nặng khớp dữ liệu hệ thống.' },
  { id:'exit', illus:ILLUS.exit, tag:'UA4 · Kiểm tra', title:'Rời siêu thị', desc:'Sau khi cổng mở, bạn nhận lại hàng, đóng gói vào túi và đẩy xe ra khỏi khu vực an toàn.',
    bullets:['Nhận hàng sau xác thực','Nhân viên đóng gói sản phẩm vào túi','Đẩy xe qua cổng để rời đi'] },
  { id:'done', illus:ILLUS.done, tag:'Hoàn tất', title:'Cảm ơn quý khách! 🎉', desc:'Bạn đã đi hết hành trình mua sắm cùng xe đẩy thông minh. Hẹn gặp lại lần sau!' },
];

/* ---------- engine ---------- */
let idx = 0;
const screensEl = document.getElementById('screens');
const navEl = document.getElementById('bottomNav');
const progressEl = document.getElementById('progressBar');

function render(){
  const step = steps[idx];
  progressEl.innerHTML = steps.map((_,i)=>`<div class="seg ${i<idx?'done':i===idx?'current':''}"></div>`).join('');
  screensEl.innerHTML = `
    <div class="screen active">
      ${step.tag ? `<div class="step-tag">${step.tag}</div>` : ''}
      ${step.illus}
      <h2 class="screen-title">${step.title}</h2>
      <p class="screen-desc">${step.desc}</p>
      ${step.bullets ? `<ul class="bullets">${step.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>` : ''}
      ${step.br ? `<div class="br-note">⚠ ${step.br}</div>` : ''}
    </div>`;
  navEl.innerHTML = '';
  if(idx > 0){
    const back = document.createElement('button');
    back.className = 'btn btn-ghost'; back.textContent = '← Trước';
    back.onclick = ()=>{ idx--; render(); };
    navEl.appendChild(back);
  }
  const next = document.createElement('button');
  next.className = 'btn btn-primary';
  next.textContent = idx === steps.length-1 ? '🔄 Bắt đầu mua sắm' : 'Tiếp theo →';
  next.onclick = ()=>{ idx = idx === steps.length-1 ? 0 : idx+1; render(); };
  navEl.appendChild(next);
  if(idx > 0 && idx < steps.length-1){
    const skip = document.createElement('button');
    skip.className = 'btn btn-skip'; skip.textContent = 'Bỏ qua';
    skip.onclick = ()=>{ idx = steps.length-1; render(); };
    navEl.appendChild(skip);
  }
}
render();
</script>
</body>
</html>
